name: Trend Join Long Breakout Monitor

on:
  # Triggered by cron-job.org at 7:55 AM MT (9:55 ET, just before the
  # 8:00 AM MT / 10:00 ET breakout window opens). The script rebuilds the
  # gap list, waits ~5 min for the window, polls 1-min bars, and self-
  # terminates at 1:30 PM MT / 3:30 PM ET. Launch time is deliberately
  # late: a single GitHub job is hard-capped at 6h, so starting at 9:55 ET
  # keeps the ~5.5h run safely under the limit. GitHub's built-in
  # `schedule:` cron was removed for the same reliability reasons as the scan.
  workflow_dispatch:            # cron-job.org + manual "Run workflow" button

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # backstop under GitHub's 6h (360 min) job cap;
                            # the script self-exits at 3:30 PM ET (~335 min)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run intraday breakout monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python monitor.py
