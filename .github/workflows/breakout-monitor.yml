name: Trend Join Long Breakout Monitor

on:
  # Triggered by cron-job.org at 7:25 AM MT (near the open). The script
  # rebuilds the gap list, waits until the 8:00 AM MT window, then polls
  # and self-terminates at 1:30 PM MT. GitHub's built-in `schedule:` cron
  # was removed for the same reliability reasons as the gap scan.
  workflow_dispatch:            # cron-job.org + manual "Run workflow" button

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 355    # backstop just under the 6h job limit;
                            # the script exits on its own at 3:30 PM ET

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run intraday breakout monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python monitor.py
