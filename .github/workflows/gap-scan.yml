name: Trend Join Long Gap Scan

on:
  # Scheduling is handled by cron-job.org, which POSTs to this workflow's
  # dispatch endpoint at 6:50 and 7:15 AM MT. GitHub's built-in `schedule:`
  # cron was removed — it silently dropped runs and can't be trusted for a
  # time-critical premarket window. cron-job.org fires to the minute and is
  # timezone-aware (no manual DST shifting).
  workflow_dispatch:            # cron-job.org + manual "Run workflow" button

permissions:
  contents: read

jobs:
  gap-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run gap scan + send Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python run.py
